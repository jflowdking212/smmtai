name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/jbliss/sites/smmt
            git pull origin main
            npm ci --production
            npx turbo run build --filter=@ee-postmind/api --filter=@ee-postmind/shared --filter=@ee-postmind/db
            npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma
            pm2 restart smmt-api --update-env

      - name: Health check
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 3 ${{ secrets.API_URL }}/api/v1/health || exit 1

  deploy-ai:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy AI service via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/jbliss/sites/smmt/apps/ai-service
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            pm2 restart smmt-ai --update-env

  deploy-web:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  rollback:
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-api, deploy-ai, deploy-web]
    environment: production
    steps:
      - name: Rollback API
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/jbliss/sites/smmt
            git checkout HEAD~1
            npm ci --production
            npx turbo run build --filter=@ee-postmind/api
            pm2 restart smmt-api --update-env
            echo "⚠️ Rolled back to previous commit"
