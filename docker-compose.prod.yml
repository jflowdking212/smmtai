# EE PostMind — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-4016}:4016"
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-4016}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postmind}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postmind}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_KEY: ${AI_SERVICE_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.eepostmind.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: apps/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${AI_PORT:-8000}:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379/1
      AI_SERVICE_KEY: ${AI_SERVICE_KEY}

  # Prisma migrations (run once)
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postmind}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postmind}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
